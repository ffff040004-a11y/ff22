<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة النسبة Mوزونة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2471a3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border: 1px solid #1abc9c;
            border-radius: 6px;
            display: none; /* مخفي حتى يتم الحساب */
        }
        .result-title {
            color: #16a085;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .result-value {
            color: #2c3e50;
            font-size: 28px;
            font-weight: bold;
        }
        .formula-note {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        .designer-credits {
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-size: 14px;
            color: #2c3e50;
        }
        .designer-credits a {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        .designer-credits a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>حاسبة النسبة الموزونة</h2>
        
        <div class="input-group">
            <label for="gpa">المعدل التراكمي للثانوية (30%):</label>
            <input type="number" id="gpa" placeholder="أدخل نسبتك في الثانوية" min="0" max="100">
        </div>

        <div class="input-group">
            <label for="qudurat">درجة القدرات (30%):</label>
            <input type="number" id="qudurat" placeholder="أدخل درجتك في القدرات" min="0" max="100">
        </div>

        <div class="input-group">
            <label for="tahsili">درجة التحصيلي (40%):</label>
            <input type="number" id="tahsili" placeholder="أدخل درجتك في التحصيلي" min="0" max="100">
        </div>

        <button onclick="calculateScore()">احسب النسبة الموزونة</button>

        <div class="result-box" id="resultBox">
            <div class="result-title">النسبة الموزونة الخاصة بك هي:</div>
            <div class="result-value" id="finalResult">0%</div>
        </div>

        <div class="formula-note">
            حسب المعادلة: (الثانوية × 0.30) + (القدرات × 0.30) + (التحصيلي × 0.40)
        </div>

        <div class="designer-credits">
            تصميم د/فواز &nbsp;&nbsp; تفضل للمزيد <a href="https://t.me/TAqhjT3MFVE1Yzk0" target="_blank">هنا</a>
        </div>
    </div>

    <script>
        function calculateScore() {
            let gpa = parseFloat(document.getElementById('gpa').value) || 0;
            let qudurat = parseFloat(document.getElementById('qudurat').value) || 0;
            let tahsili = parseFloat(document.getElementById('tahsili').value) || 0;

            if(gpa > 100 || qudurat > 100 || tahsili > 100) {
                alert("الرجاء إدخال درجات صحيحة (من 0 إلى 100)");
                return;
            }

            let weightedGPA = gpa * 0.30;
            let weightedQudurat = qudurat * 0.30;
            let weightedTahsili = tahsili * 0.40;

            let finalScore = weightedGPA + weightedQudurat + weightedTahsili;

            let resultBox = document.getElementById('resultBox');
            let finalResultText = document.getElementById('finalResult');
            
            resultBox.style.display = 'block';
            finalResultText.innerText = finalScore.toFixed(2) + '%';
        }
    </script>

</body>
</html>
