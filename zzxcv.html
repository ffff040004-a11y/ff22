ديم داخل القاعة التدريبية فقط"}, "answer": "ب", "page": 34}, {"id": 228, "question": "أي من العبارات التالية تُعبّر بدقة عن مفهوم مجتمعات التعلم المهنية الرقمية؟", "options": {"أ": "مجموعات تدريبية حضورية تُعقد داخل المؤسسات التعليمية في أوقات محددة", "ب": "برامج تعليم فردي إلكترونية دون تفاعل مهني منظم", "ت": "منصات إلكترونية مخصصة لعرض المحتوى التعليمي فقط", "ث": "مجتمعات مهنية رقمية تفاعلية لا تتقيد بحدود المكان أو الزمان"}, "answer": "ث", "page": 34}, {"id": 229, "question": "الاستدلال الاستقرائي هو:", "options": {"أ": "الانتقال من القواعد العامة إلى نتائج مؤكدة", "ب": "الانتقال من ملاحظات جزئية إلى تعميمات عامة محتملة", "ت": "الاعتماد على التخمين دون ملاحظات", "ث": "إثبات النتائج بشكل قطعي من مقدمات ثابتة"}, "answer": "ب", "page": 34}, {"id": 230, "question": "مدرب بعد برنامج تدريبي سجل ملاحظاته على أدائه، وحدد نقاط القوة والضعف، ثم وضع خطة للتطوير؛ هذا العمل يعني:", "options": {"أ": "جمع بيانات", "ب": "تقييم ذاتي", "ت": "ملاحظات", "ث": "جمع معلومات"}, "answer": "ب", "page": 34}, {"id": 231, "question": "ما نوع التدريب الاكثر مناسبة لتنمية الموظف الجديد وتأهيله للاندماج في بيئة العمل؟", "options": {"أ": "التدريب التحويلي", "ب": "التدريب التهيئي (التعريفي).", "ت": "التدريب العلاجي", "ث": "التدريب المتقدم"}, "answer": "ب", "page": 34}, {"id": 232, "question": "هل يُعد قيام المدرب بتسجيل البيانات الشخصية للمتدربين في موقع المؤسسة الرسمي باستخدام جهازه الشخصي إجراءً نظاميًا؟", "options": {"أ": "نعم، يُعد إجراءً نظاميًا لأنه مدرب.", "ب": "إجراء غير نظامي.", "ت": "نعم، إذا كان الموقع رسميًا بغضّ النظر عن نوع الجهاز المستخدم", "ث": "نظامي إذا كان جهازه محميًا."}, "answer": "ب", "page": 35}, {"id": 233, "question": "أي من البدائل التالية يُصنّف البرامج الحاسوبية المستخدمة في التطوير والتدريب تصنيفًا صحيحًا وشاملًا:", "options": {"أ": "PowerPoint، Word، Excel.باعتبارها أدوات إعداد محتوى تدريبي فقط", "ب": "Power BI لتحليل البيانات، TalentLMS لإدارة التعلم، PowerPoint للعروض، Microsoft Teams للتعاون، وOneNote لتدوين الملاحظات.", "ت": "Microsoft Teams وOneNote بوصفهما أدوات تواصل دون علاقة مباشرة بالتدريب.", "ث": "Power BI وExcel لكونهما برامج تحليل بيانات دون توظيف تدريبي مباشر."}, "answer": "ب", "page": 35}, {"id": 234, "question": "كنت مدربًا ولاحظت أن أحد المتدربين يجلس في آخر القاعة ولا يشارك مع بقية المتدربين أثناء البرنامج التدريبي، ما التصرف الاكثر ملاءمة مهنيًا للتعامل مع هذا الموقف؟", "options": {"أ": "تجاهل المتدرب وعدم التدخل حتى لا يُسبب إرباكًا لسير التدريب", "ب": "إشراكه بأسئلة وأنشطة مناسبة بطريقة تدريجية مع مراعاة أسلوبه وشخصيته", "ت": "توجيه ملاحظة مباشرة له أمام المتدربين لإلزامه بالمشاركة.", "ث": "مطالبة الجهة المنظمة بإخراجه من القاعة لعدم تفاعله"}, "answer": "ب", "page": 35}, {"id": 235, "question": "كنت مدربًا ودار نقاش بينك وبين المتدربين، وحدث اختلاف في وجهات النظر حول موضوع معين. ما التصرف الاكثر مهنية لاحتواء الموقف؟", "options": {"أ": "الإصرار على رأيك وإيقاف النقاش حفاظًا على سير البرنامج", "ب": "الاستماع لوجهات نظر المتدربين باحترام، وتنظيم النقاش وتوجيهه نحو أهداف التدريب", "ت": "تجاهل آراء المتدربين والانتقال مباشرة إلى المحور التالي", "ث": "إنهاء الجلسة مؤقتًا لتجنب تصاعد الخلاف."}, "answer": "ب", "page": 35}, {"id": 236, "question": "أثناء تنفيذ برنامج تدريبي، دخل أحد المتدربين في جدال حول قضية شرعية واحتد النقاش داخل القاعة التدريبية. ما الإجراء المهني الأنسب الذي ينبغي على المدرب اتخاذه؟", "options": {"أ": "الاستمرار في النقاش لإثبات الرأي الصحيح حفاظًا على هيبة المدرب", "ب": "تهدئة الحوار وضبط إدارة النقاش مع احترام الآراء، وتوجيهه بما لا يخلّ بأهداف البرنامج", "ت": "إيقاف المتدرب عن المشاركة وإنهاء النقاش فورًا", "ث": "تجاهل النقاش ومتابعة المحتوى التدريبي دون تدخل"}, "answer": "ب", "page": 35}, {"id": 237, "question": "مؤسسة تدريبية درست وضعها الحالي، وحددت نقاط القوة والضعف، ثم صاغت رؤيتها ورسالتها، وأعدّت خطة مستقبلية؛ فما الإجراء الذي اتبعته المؤسسة؟", "options": {"أ": "تحليل الاحتياجات التدريبية", "ب": "التخطيط الاستراتيجي", "ت": "التقويم الختامي للبرامج التدريبية", "ث": "إدارة الجودة الشاملة"}, "answer": "ب", "page": 35}, {"id": 238, "question": "مؤسسة تدريبية قدمت عرضًا لك لتدرب لديها، فما أهم معلومة تركز عليها؟", "options": {"أ": "كم عدد الأيام التدريبية المطلوبة", "ب": "ما هو موضوع الدورة التدريبية", "ت": "أين مقر التدريب", "ث": "من هي الفئة المستهدفة"}, "answer": "ب", "page": 36}, {"id": 239, "question": "عرض مدرب موقفًا تدريبيًا على الشاشة، وطلب من القادة تحليل الموقف، وجمع أسبابه، واقتراح حلول مناسبة للمشكلة. ما نوع الممارسة التدريبية التي استخدمها المدرب؟", "options": {"أ": "العصف الذهني", "ب": "دراسة الحالة", "ت": "المحاضرة التفاعلية", "ث": "التعلم الذاتي"}, "answer": "ب", "page": 36}, {"id": 240, "question": "مدرب يقدم دورة تدريبية مدتها ثلاثة أيام، وفي نهاية اليوم الأول كلف المتدربين بنشاط منزلي، ثم ناقش معهم نتائج هذا النشاط في اليوم التالي. ما نوع التقييم الذي قام به المدرب؟", "options": {"أ": "تقييم قبلي", "ب": "تقييم تكويني", "ت": "تقييم بعدي", "ث": "تقييم تجميعي"}, "answer": "ب", "page": 36}, {"id": 241, "question": "في دورة تدريبية مقدمة لمجموعة من القادة، تتناول موضوع المستقبل وما قد يطرأ من مشكلات مع استعراض الحلول الممكنة لها، أي أسلوب تدريبي يُعد الأنسب ليقدم المدرب من خلاله مقدمة فعالة للمتدربين؟", "options": {"أ": "أسلوب المحاكاة", "ب": "أسلوب السيناريو", "ت": "أسلوب العصف الذهني", "ث": "أسلوب تمثيل الأدوار"}, "answer": "ب", "page": 36}, {"id": 242, "question": "السلوك المهني الصحيح للمدرب عند حدوث خلاف داخل القاعة:", "options": {"أ": "تجاهل الموقف", "ب": "إدارة الحوار بحياد", "ت": "الانحياز لطرف", "ث": "إنهاء الجلسة"}, "answer": "ب", "page": 36}, {"id": 243, "question": "عند اختلاف مستويات المتدربين وفق الذكاءات المتعددة، يُفضل أن يستخدم المدرب:", "options": {"أ": "أسلوبًا واحدًا", "ب": "أنشطة متنوعة", "ت": "التلقين فقط", "ث": "الشرح النظري"}, "answer": "ب", "page": 36}, {"id": 244, "question": "التدريب على رأس العمل (OJT) يتميز بـ:", "options": {"أ": "ًارتفاع التكلفة جدا", "ب": "واقعية التدريب وارتباطه المباشر بالمهام اليومية", "ت": "عدم الحاجة لمشرف", "ث": "أنه نظري فقط"}, "answer": "ب", "page": 37}, {"id": 245, "question": "ماذا تعني مصفوفة المهارات/الصلاحيات في إدارة التدريب؟", "options": {"أ": "تحديد من يحق له الحضور ومن لا جه بأسئلة تعجيزية", "ب": "توظيف خبرته في مساعدة المجموعات بتقدير متزن", "ت": "تركه يدير الجلسة بدالً من المدرب", "ث": "تجاهل وجوده"}, "answer": "ب", "page": 38}, {"id": 254, "question": "أفضل طريقة لإدارة الخلاف بين متدربين داخل القاعة:", "options": {"أ": "الوقوف مع الطرف الأقوى", "ب": "التدخل بحياد وتركيز النقاش على الموضوع وليس الأشخاص", "ت": "تركهم حتى يتشاجروا", "ث": "طرد الطرفين"}, "answer": "ب", "page": 38}, {"id": 255, "question": "في حال طرح متدرب سؤالًا مستفزًا للمدرب:", "options": {"أ": "يرد عليه بنفس الأسلوب", "ب": "يلتزم الهدوء، ويعيد صياغة السؤال بشكل موضوعي", "ت": "يطلب من الأمن التدخل", "ث": "يحوله للمدير المباشر للمتدرب"}, "answer": "ب", "page": 38}, {"id": 256, "question": "عند حدوث عطل فني في جهاز العرض، ماذا يفعل المدرب الناجح؟", "options": {"أ": "ينهي التدريب فورًا ويكمل الغد", "ب": "يستخدم البدائل (مثل السبورة الورقية) ويكمل البرنامج", "ت": "ينتظر مهندس الصيانة ويتوقف عن الحديث", "ث": "يلوم المركز التدريبي أمام المتدربين"}, "answer": "ب", "page": 39}, {"id": 257, "question": "أفضل مكان لوقوف المدرب في قاعة حرف (U) هو:", "options": {"أ": "في زاوية القاعة الخلفية", "ب": "الجلوس على الكرسي خلف الطاولة", "ت": "الوقوف بجانب الباب", "ث": "في المنطقة المفتوحة ليتمكن الجميع من رؤيته"}, "answer": "ث", "page": 39}, {"id": 258, "question": "استخدام القصص في التدريب يساعد على:", "options": {"أ": "استرخاء عميق للمتدربين", "ب": "تقريب المفاهيم المجردة وربطها بالواقع", "ت": "إطالة وقت البرنامج بدون فائدة", "ث": "إظهار بطوالت المدرب الشخصية فقط"}, "answer": "ب", "page": 39}, {"id": 259, "question": "توزيع النظرات على المتدربين (Technique Z) يهدف إلى:", "options": {"أ": "مراقبة المتدربين باستمرار أثناء التدريب", "ب": "إشعار جميع المتدربين بالاهتمام والتواصل", "ت": "التأكد من الحضور والغياب", "ث": "تخويف المتدربين المشاكسين"}, "answer": "ب", "page": 39}, {"id": 260, "question": "قاعدة (7% - 38% - 55%) لمهرابيان تشير إلى أن التأثير الأكبر في الرسالة يكون لـ:", "options": {"أ": "الكلمات المنطوقة اللفظية", "ب": "لغة الجسد ونبرات الصوت والكلام", "ت": "مدة استخدام الم let state = JSON.parse(localStorage.getItem('trainerLicenseGame')||'{}'); if(!state.answers) state={answers:{},score:0,wrong:0};
let round=[], idx=0, selected=null, locked=false; const $=id=>document.getElementById(id);
function save(){localStorage.setItem('trainerLicenseGame',JSON.stringify(state));}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startGame(){const mode=$('mode').value; let list=[...QUESTION_BANK]; if(mode==='wrong') list=list.filter(q=>state.answers[q.id]&&!state.answers[q.id].correct); if(mode==='unanswered') list=list.filter(q=>!state.answers[q.id]); if($('shuffle').checked) shuffleArr(list); const lim=Math.max(5,Math.min(294,parseInt($('limit').value)||294)); round=list.slice(0,lim); idx=0; selected=null; locked=false; if(!round.length){toast('لا توجد أسئلة في هذا النمط حاليًا');return;} openTab('quiz'); renderQuestion(); updateStats();}
function renderQuestion(){if(!round.length)return; const q=round[idx]; selected=null; locked=false; $('feedback').className='feedback'; $('feedback').innerHTML=''; $('qCounter').textContent=`السؤال ${idx+1} من ${round.length}`; $('pageRef').textContent=`من الصفحة: ${q.page}`; $('bar').style.width=`${(idx/round.length)*100}%`; $('question').textContent=q.id+'. '+q.question; const letters=['أ','ب','ت','ث']; $('options').innerHTML=''; letters.forEach(l=>{const btn=document.createElement('button'); btn.className='opt'; btn.onclick=()=>choose(l); btn.dataset.letter=l; btn.innerHTML=`<span class="letter">${l}</span><span>${q.options[l]||''}</span>`; $('options').appendChild(btn);});}
function choose(l){if(locked)return; selected=l; document.querySelectorAll('.opt').forEach(b=>b.classList.toggle('selected',b.dataset.letter===l));}
function checkAnswer(){if(!round.length)return; const q=round[idx]; if(!selected){toast('اختر إجابة أولاً يا بطل');return;} locked=true; const ok=selected===q.answer; state.answers[q.id]={choice:selected,correct:ok,answer:q.answer,at:new Date().toLocaleString('ar-SA')}; save(); document.querySelectorAll('.opt').forEach(b=>{const l=b.dataset.letter; if(l===q.answer)b.classList.add('correct'); if(l===selected&&!ok)b.classList.add('wrong');}); const fb=$('feedback'); fb.className='feedback '+(ok?'ok':'no'); fb.innerHTML=ok?'يا سلام عليك… واصل التقدم ✅':`حظ أوفر، أكمل يا بطل لا تتقهقر 💪<div class="answer-note">الإجابة الصحيحة: ${q.answer} - ${q.options[q.answer]}</div>`; if(ok) confetti(); beep(ok); updateStats(); if($('autoNext').checked) setTimeout(()=>nextQ(),ok?900:1400);}
function revealAnswer(){if(!round.length)return; selected=round[idx].answer; checkAnswer();}
function nextQ(){if(idx<round.length-1){idx++;renderQuestion();}else{$('bar').style.width='100%';openTab('report');renderReport();toast('انتهت الجولة… يعطيك العافية');}}
function prevQ(){if(idx>0){idx--;renderQuestion();}}
function updateStats(){const vals=Object.values(state.answers); const c=vals.filter(x=>x.correct).length; const w=vals.filter(x=>!x.correct).length; $('score').textContent=c; $('wrong').textContent=w; $('done').textContent=vals.length; $('total').textContent=QUESTION_BANK.length;}
function openTab(name){['quiz','review','report'].forEach(n=>{$(n).classList.toggle('active',n===name); $('tab'+n[0].toUpperCase()+n.slice(1)).classList.toggle('active',n===name);}); if(name==='review')renderReview(); if(name==='report')renderReport();}
function showReview(){openTab('review')}
function renderReview(){const s=($('search')?.value||'').trim(); let list=QUESTION_BANK.filter(q=>!s||(q.question+' '+Object.values(q.options).join(' ')).includes(s)); $('reviewList').innerHTML=list.map(q=>{const a=state.answers[q.id]; const status=a?(a.correct?'✅':'❌'):'▫️'; return `<div class="mini-q"><b>${status} سؤال ${q.id}</b> <small>صفحة ${q.page}</small><br>${q.question}<br><span style="color:#a8bed4">الإجابة: ${q.answer} - ${q.options[q.answer]}</span></div>`}).join('')||'<div class="empty">لا توجد نتائج</div>';}
function renderReport(){const vals=Object.entries(state.answers); const c=vals.filter(([_,v])=>v.correct).length; const w=vals.length-c; const pct=vals.length?Math.round(c/vals.length*100):0; const wrongs=vals.filter(([_,v])=>!v.correct).map(([id])=>QUESTION_BANK.find(q=>q.id==id)).filter(Boolean); $('reportBox').innerHTML=`<div class="stat"><div><b>${c}</b><span>صحيح</span></div><div><b>${w}</b><span>خطأ</span></div><div><b>${pct}%</b><span>النسبة</span></div><div><b>${vals.length}</b><span>مجاب</span></div></div><h3>أسئلة تحتاج مراجعة</h3><div class="review-list">${wrongs.length?wrongs.map(q=>`<div class="mini-q"><b>سؤال ${q.id}</b><br>${q.question}<br><span style="color:#a8bed4">الصحيح: ${q.answer} - ${q.options[q.answer]}</span></div>`).join(''):'<div class="empty">لا توجد أخطاء… يا ساتر على التركيز!</div>'}</div>`;}
function resetAll(){if(confirm('تأكيد تصفير كل النتائج؟')){state={answers:{},score:0,wrong:0};save();updateStats();renderQuestion();toast('تم التصفير')}}
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function confetti(){const box=$('confetti');for(let i=0;i<26;i++){const p=document.createElement('i');p.className='piece';p.style.left=Math.random()*100+'vw';p.style.animationDelay=Math.random()*0.3+'s';p.style.background=['#f5c15c','#4bc4ff','#31d07f','#ff647c'][Math.floor(Math.random()*4)];box.appendChild(p);setTimeout(()=>p.remove(),1600)}}
function beep(ok){if(!$('sound').checked)return; try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=ok?660:220;g.gain.value=.04;o.start();setTimeout(()=>{o.stop();ctx.close();},120)}catch(e){}}
function exportJSON(){const blob=new Blob([JSON.stringify({answers:state.answers,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trainer-license-results.json';a.click();}
updateStats(); startGame();
</script></body></html>
