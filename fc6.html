        }

        .container {

        }

        }

        .header p {

        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);

        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            transition: width 0.3s ease;
        }

        .content {
            padding: 40px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #f3f4f6;
            padding: 20px;
            border-radius: 10px;
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .score-box h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .score-box .number {
            font-size: 28px;
            font-weight: bold;
            color: #764ba2;
        }

        .question-number {
            text-align: center;
            flex: 1;
            color: #667eea;
            font-weight: bold;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-text {
            background: #f9fafb;
            padding: 20px;
            border-right: 4px solid #667eea;
            margin-bottom: 25px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: 500;
            color: #1f2937;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 16px;
            color: #374151;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(-5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #e0e7ff;
        }

        .option.correct {
            border-color: #4ade80;
            background: #dcfce7;
            color: #166534;
        }

        .option.incorrect {
            border-color: #ef4444;
            background: #fee2e2;
            color: #991b1b;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback.show {
            display: block;
        }

        .feedback.success {
            background: #dcfce7;
            border-left: 4px solid #4ade80;
            color: #166534;
        }

        .feedback.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .feedback-message {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .correct-answer {
            font-size: 14px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emojis {
            font-size: 40px;
            margin-bottom: 10px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .button-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);

        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-restart {
            background: #4ade80;
            color: white;
        }

        .btn-restart:hover {
            transform: translateY(-2px);

            margin-bottom: 15px;
            font-size: 28px;
        }

            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }

        .score-detail {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 30px;
        }

            text-align: center;
            border-top: 1px solid #e5e7eb;
        }

        .settings-footer p {
            color: #6b7280;
            margin-bottom: 10px;
            font-size: 14px;
        }

            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin: 10px 5px;

            padding: 8px 15px;
            border-radius: 5px;
        }

        .designer-link:hover {
            background: #e0e7ff;
            color: #764ba2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 {

            }

                padding: 20px;

                flex-direction: column;
                gap: 15px;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

            {
                question: "أي مما يلي لا يعد نوعاً من الطفرات؟",
                options: ["استبدال القاعدة", "تداخل RNA", "القواعد النيتروجينية", "انتقال الجينات"],
                correct: 2,
                category: "العلوم"
            },
            {
                question: "بماذا تمتاز التوائم المتماثلة؟",
                options: ["تنشأ من بويضة واحدة", "تنشأ من عدة بويضات", "لها مادة وراثية مختلفة", "تختلف في نوع الجنس"],
                correct: 0,
                category: "العلوم"
            },
            {
                question: "مما يميز النبات وجود بلاستيدات خضراء، ما العملية الحيوية التي تقوم بها؟",
                options: ["التنفس الخلوي", "التخمر", "البناء الضوئي", "النقل النشط"],
                correct: 2,
                category: "العلوم"
            },
            {
                question: "عند إضافة محلول من كلوريد الباريوم إلى محلول من كبريتات الصوديوم تحول اللون إلى الأبيض، ما نوع التغير؟",
                options: ["تغير كيميائي", "تغير حيوكيميائي", "تغير حيوي", "تغير فيزيائي"],
                correct: 0,
                category: "العلوم"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let correctAnswers = 0;
        let answered = false;

        function initQuiz() {
            displayQuestion();
        }

        function displayQuestion() {
            const question = quizData[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            let html = `<div class="question-text">السؤال: ${question.question}</div>`;
            html += '<div class="options">';
            
            question.options.forEach((option, index) => {
                html += `<div class="option" data-index="${index}">${String.fromCharCode(1575 + index)}. ${option}</div>`;
            });
            
            html += '</div><div class="feedback" id="feedback"></div>';
            container.innerHTML = html;
            
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', selectOption);
            });
            
            updateProgress();
            answered = false;
            document.getElementById('nextBtn').disabled = true;
        }

        function selectOption(e) {
            if (answered) return;
            
            const selectedIndex = parseInt(e.target.dataset.index);
            const correct = selectedIndex === quizData[currentQuestion].correct;
            answered = true;
            
            document.querySelectorAll('.option').forEach((opt, index) => {
                opt.style.pointerEvents = 'none';
                if (index === quizData[currentQuestion].correct) {
                    opt.classList.add('correct');
                }
                if (index === selectedIndex && !correct) {
                    opt.classList.add('incorrect');
                }
            });
            
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');
            
            if (correct) {
                score += 10;
                correctAnswers++;
                feedback.classList.add('success');
                const messages = ['🎉 إجابة صحيحة!', '👏 ممتاز!', '⭐ رائع جداً!', '🌟 عبقري!'];
                feedback.innerHTML = `<div class="emojis">🎉</div><div class="feedback-message">${messages[Math.floor(Math.random() * messages.length)]}</div>`;
            } else {
                feedback.classList.add('error');
                feedback.innerHTML = `<div class="emojis">😔</div><div class="feedback-message">الإجابة غير صحيحة، حاول مرة أخرى!</div><div class="correct-answer">✓ الإجابة الصحيحة: ${String.fromCharCode(1575 + quizData[currentQuestion].correct)}. ${quizData[currentQuestion].options[quizData[currentQuestion].correct]}</div>`;
            }
            
            updateScore();
            document.getElementById('nextBtn').disabled = false;
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('correctCounter').textContent = correctAnswers;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionCounter').textContent = `السؤال ${currentQuestion + 1} من ${quizData.length}`;
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                displayQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            const percentage = (correctAnswers / quizData.length) * 100;
            const message = percentage === 100 ? '🏆 درجة كاملة! أنت عبقري!' : 
                           percentage >= 80 ? '🌟 ممتاز جداً!' :
                           percentage >= 60 ? '👍 جيد!' :
                           percentage >= 40 ? '📚 يمكنك أن تحاول مرة أخرى' :
                           '💪 تابع المحاولة!';
            
            document.getElementById('quizContent').innerHTML = `
                <div class="finish-message">
                    <h2>${message}</h2>
                    <div class="final-score">${score}/${quizData.length * 10}</div>
                    <div class="score-detail">نسبة النجاح: ${percentage.toFixed(1)}%</div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">عدد الأسئلة</div>
                            <div class="stat-value">${quizData.length}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">الإجابات الصحيحة</div>
                            <div class="stat-value">${correctAnswers}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">الإجابات الخاطئة</div>
                            <div class="stat-value">${quizData.length - correctAnswers}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">النقاط النهائية</div>
                            <div class="stat-value">${score}</div>
                        </div>
                    </div>
                    <div class="button-container">
                        <button class="btn-restart" onclick="location.reload()">🔄 إعادة المسابقة</button>
                    </div>
                </div>
            `;
        }

        // Initialize quiz
        initQuiz();
    </script>
</body>
</html>
